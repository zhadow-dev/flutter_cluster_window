name: flutter_cluster_window
description: >-
  Deterministic multi-window cluster runtime for Flutter on Windows.
  Treat multiple OS windows as one unified application — sidebars,
  titlebars, overlays — all synchronized with native DWM effects.
version: 0.0.1
repository: https://github.com/user/flutter_cluster_window
issue_tracker: https://github.com/user/flutter_cluster_window/issues
topics:
  - desktop
  - windows
  - multi-window
  - acrylic

environment:
  sdk: ^3.11.5
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  desktop_multi_window: ^0.3.0
  window_manager: ^0.5.1
  flutter_acrylic: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterClusterWindowPluginCApi
